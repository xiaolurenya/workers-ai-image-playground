<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小路人文生图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    h1 { text-align: center; font-size: 28px; margin-bottom: 8px; color: #fff; }
    .subtitle { text-align: center; color: #666; margin-bottom: 40px; font-size: 14px; }
    .models {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
      background: #12121a; border-radius: 12px; padding: 16px;
    }
    .model-btn {
      padding: 8px 16px; border-radius: 8px; border: 1px solid #333;
      background: transparent; color: #888; cursor: pointer; font-size: 14px;
      transition: all 0.2s;
    }
    .model-btn.active { border-color: #6366f1; color: #fff; background: #1e1b4b; }
    .model-btn:hover { border-color: #6366f1; color: #fff; }
    .prompt-box {
      width: 100%; min-height: 120px; padding: 16px;
      background: #12121a; border: 1px solid #333; border-radius: 12px;
      color: #fff; font-size: 16px; resize: vertical; margin-bottom: 16px;
      font-family: inherit;
    }
    .prompt-box:focus { outline: none; border-color: #6366f1; }
    .prompt-box::placeholder { color: #555; }
    .generate-btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
      margin-bottom: 24px; transition: opacity 0.2s;
    }
    .generate-btn:hover { opacity: 0.9; }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .gallery {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .image-card {
      background: #12121a; border-radius: 12px; overflow: hidden;
      border: 1px solid #1f1f2e; transition: transform 0.2s;
    }
    .image-card:hover { transform: translateY(-2px); border-color: #333; }
    .image-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
    .image-card .info { padding: 10px 12px; font-size: 12px; color: #666; }
    .image-card .info .prompt { color: #999; margin-bottom: 4px; word-break: break-all; }
    .loading {
      text-align: center; padding: 40px; color: #6366f1;
      font-size: 14px; grid-column: 1 / -1;
    }
    .error {
      text-align: center; padding: 16px; background: #2d1515;
      border: 1px solid #ef4444; border-radius: 12px;
      color: #f87171; margin-bottom: 16px; font-size: 14px;
    }
    .status {
      text-align: center; padding: 16px; background: #12121a;
      border-radius: 12px; color: #666; font-size: 13px; margin-bottom: 20px;
    }
    .clear-btn {
      width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #333;
      background: transparent; color: #666; cursor: pointer; font-size: 14px;
      margin-bottom: 20px;
    }
    .clear-btn:hover { border-color: #ef4444; color: #ef4444; }
    /* Login overlay */
    #loginOverlay {
      position: fixed; inset: 0; background: #0a0a0f; z-index: 999;
      display: flex; align-items: center; justify-content: center;
    }
    #loginOverlay.hidden { display: none; }
    .login-box {
      background: #12121a; padding: 40px; border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5); width: 360px; text-align: center;
    }
    .login-box h2 { color: #fff; margin-bottom: 8px; font-size: 22px; }
    .login-box p { color: #555; margin-bottom: 24px; font-size: 14px; }
    .login-box input {
      width: 100%; padding: 12px 16px; border-radius: 8px;
      border: 1px solid #333; background: #0a0a0f; color: #fff;
      font-size: 16px; margin-bottom: 16px; text-align: center;
    }
    .login-box input:focus { outline: none; border-color: #6366f1; }
    .login-box button {
      width: 100%; padding: 12px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; font-size: 16px; cursor: pointer; font-weight: 600;
    }
    .login-box button:hover { opacity: 0.9; }
    .login-error { color: #f87171; font-size: 13px; margin-top: 8px; display: none; }
    .footer { text-align: center; margin-top: 40px; color: #333; font-size: 12px; }
  </style>
</head>
<body>

<!-- 登录验证 -->
<div id="loginOverlay">
  <div class="login-box">
    <h2>🔐 小路人文生图</h2>
    <p>输入访问密码</p>
    <input type="password" id="passwordInput" placeholder="请输入密码" onkeydown="if(event.key==='Enter')checkPassword()">
    <button onclick="checkPassword()">进入</button>
    <div class="login-error" id="loginError">密码错误，请重试</div>
  </div>
</div>

<div class="container" id="mainContent" style="display:none">
  <h1>🎨 小路人文生图</h1>
  <p class="subtitle">Powered by Cloudflare Workers AI · 4款免费模型</p>

  <div class="status" id="status">✅ 服务正常 · 请选择模型后输入描述</div>

  <div class="models">
    <button class="model-btn active" data-model="@cf/black-forest-labs/flux-1-schnell">⚡ Flux Schnell<br><small>快速生成</small></button>
    <button class="model-btn" data-model="@cf/stabilityai/stable-diffusion-xl-base-1.0">🖌️ SDXL<br><small>精细写实</small></button>
    <button class="model-btn" data-model="@cf/bytedance/sdxl-turbo">🚀 Turbo<br><small>超快速度</small></button>
    <button class="model-btn" data-model="@cf/segmind/SSD-1B">🎯 Segmind SSD<br><small>均衡质量</small></button>
  </div>

  <textarea class="prompt-box" id="promptInput" placeholder="输入你的画面描述...
例如：一只橘色的小猫在窗台上晒太阳，温暖的光线，超写实风格"></textarea>

  <div class="error" id="errorBox" style="display:none"></div>

  <button class="generate-btn" id="generateBtn" onclick="generateImage()">
    🚀 生成图片
  </button>

  <button class="clear-btn" onclick="clearGallery()">🗑️ 清空图库</button>

  <div class="gallery" id="gallery"></div>

  <p class="footer">Generated by 小路人 · Cloudflare Workers AI</p>
</div>

<script>
const PASSWORD = 'Liwenfei@43';
const WORKER_URL = location.origin; // 自动用当前域名

// 检查登录状态
if (localStorage.getItem('img_auth') === btoa(PASSWORD)) {
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('mainContent').style.display = 'block';
}

async function checkPassword() {
  const pwd = document.getElementById('passwordInput').value;
  try {
    const res = await fetch(WORKER_URL + 'WORKER_URL + /create/login', {
      method: 'POST',
      body: new URLSearchParams({ password: pwd }),
      credentials: 'include'
    });
    if (res.ok) {
      localStorage.setItem('img_auth', btoa(pwd));
      document.getElementById('loginOverlay').classList.add('hidden');
      document.getElementById('mainContent').style.display = 'block';
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('passwordInput').value = '';
    }
  } catch {
    // fallback: 直接验证密码
    if (pwd === PASSWORD) {
      localStorage.setItem('img_auth', btoa(pwd));
      document.getElementById('loginOverlay').classList.add('hidden');
      document.getElementById('mainContent').style.display = 'block';
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }
}

// 模型选择
let selectedModel = '@cf/black-forest-labs/flux-1-schnell';
document.querySelectorAll('.model-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedModel = btn.dataset.model;
  });
});

// 生成图片
async function generateImage() {
  const prompt = document.getElementById('promptInput').value.trim();
  if (!prompt) { showError('请输入画面描述'); return; }

  const btn = document.getElementById('generateBtn');
  const errorBox = document.getElementById('errorBox');
  const gallery = document.getElementById('gallery');
  const status = document.getElementById('status');

  errorBox.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';

  const loadingId = 'loading-' + Date.now();
  gallery.insertAdjacentHTML('afterbegin',
    `<div class="loading" id="${loadingId}">⚡ 正在生成 "${prompt.slice(0,30)}..." 请稍等（首次可能需要30秒）</div>`);

  try {
    // 通过Worker代理生成（Worker处理Workers AI调用）
    const response = await fetch(WORKER_URL + 'WORKER_URL + /create/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, model: selectedModel }),
      credentials: 'include'
    });

    document.getElementById(loadingId)?.remove();

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error || `生成失败: ${response.status}`);
    }

    const blob = await response.blob();
    const imageUrl = URL.createObjectURL(blob);

    const card = document.createElement('div');
    card.className = 'image-card';
    card.innerHTML = `
      <img src="${imageUrl}" alt="${prompt}" loading="lazy">
      <div class="info">
        <div class="prompt">${escapeHtml(prompt)}</div>
        <div>${selectedModel.split('/').pop()}</div>
      </div>
    `;
    gallery.insertAdjacentHTML('afterbegin', card.outerHTML);

    status.textContent = `✅ 生成成功 · ${new Date().toLocaleTimeString('zh-CN')}`;
    document.getElementById('promptInput').value = '';

  } catch (e) {
    document.getElementById(loadingId)?.remove();
    showError(e.message || '生成失败，请检查密码或稍后重试');
  } finally {
    btn.disabled = false;
    btn.textContent = '🚀 生成图片';
  }
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = '❌ ' + msg;
  box.style.display = 'block';
}

function clearGallery() {
  if (confirm('确定清空所有图片？')) {
    document.getElementById('gallery').innerHTML = '';
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// 回车快捷键
document.getElementById('promptInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) generateImage();
});
</script>
</body>
</html>
